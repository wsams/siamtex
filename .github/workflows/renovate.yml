name: Renovate

on:
  schedule:
    # Every 2 hours — keep dependency PRs timely without burning too many minutes.
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      logLevel:
        description: Renovate log level
        required: false
        default: info
        type: choice
        options:
          - info
          - debug
  push:
    branches:
      - main
    paths:
      - .github/workflows/renovate.yml
      - renovate.json

concurrency:
  group: renovate-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@3064367f740a1a91cca218698a63902689cce200 # v46.1.20
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
          # Pin the bot image; Renovate will open PRs to bump this value.
          renovate-version: 43.279.0
        env:
          # Required for self-hosted runs: without this, Renovate exits with
          # "No repositories found - did you want to run with flag --autodiscover?"
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          # Prefer commits as the token user rather than the shared Mend author.
          RENOVATE_PLATFORM_COMMIT: "true"
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
